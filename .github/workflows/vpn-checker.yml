name: Update VPN Subscription

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:          # для ручного запуска

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # даём права на запись в репозиторий

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # Если используете персональный токен, раскомментируйте:
          # token: ${{ secrets.GH_PAT }}
          fetch-depth: 0       # нужен полный доступ к истории для pull и push

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests
          pip install ping3 || true   # опционально

      - name: Run parser
        run: |
          python -u vpn_checker.py 2>&1 | tee output.log
          exit ${PIPESTATUS[0]}

      - name: Upload artifact (for download)
        uses: actions/upload-artifact@v5
        with:
          name: vpn-subscription
          path: FREE-VPN-FROM-KIRILL.json

      - name: Commit and push if changed
        env:
          # GITHUB_TOKEN автоматически доступен, но можно явно передать
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add FREE-VPN-FROM-KIRILL.json
          if git diff --staged --quiet; then
            echo "No changes to commit, skipping push."
          else
            git commit -m "Auto-update subscription $(date -u '+%Y-%m-%d %H:%M:%S')"
            # Обновляем локальную ветку перед пушем (избегаем конфликтов)
            git pull --rebase origin ${{ github.ref_name }} || true
            git push origin ${{ github.ref_name }}
          fi
