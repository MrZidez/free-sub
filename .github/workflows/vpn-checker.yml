name: VPN Ping Checker

on:
  schedule:
    # Запуск каждые 6 часов
    - cron: '0 */6 * * *'
  # Для ручного запуска
  workflow_dispatch:
  # Запуск при пуше в main
  push:
    branches:
      - main

jobs:
  check-vpn:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Run VPN checker
      run: python vpn_checker.py
    
    - name: Commit and push if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add FREE-VPN-FROM-KIRILL.txt
        git diff --staged --quiet || git commit -m "Обновление VPN ключей $(date '+%Y-%m-%d %H:%M:%S')"
        git push
