name: Update VPN Subscription

on:
  schedule:
    - cron: '0 0 1 */2 *'   # каждый первый день каждого второго месяца (примерно 60 дней)
  workflow_dispatch:        # чтобы можно было запустить вручную

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install requests
          # ping3 не обязателен, но если нужен ICMP, установим
          pip install ping3 || true
      - name: Run parser
        run: python vpn_checker.py
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: vpn-subscription
          path: FREE-VPN-FROM-KIRILL.json
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add FREE-VPN-FROM-KIRILL.json
          git diff --staged --quiet || git commit -m "Auto-update subscription"
          git push
