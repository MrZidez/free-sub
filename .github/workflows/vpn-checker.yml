name: Update VPN Subscription  # <- обязательно с name:

on:
  schedule:
    - cron: '0 0 1 */2 *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install requests
          pip install ping3 || true
      - name: Run parser
        run: |
          python -u vpn_checker.py 2>&1 | tee output.log
          exit ${PIPESTATUS[0]}
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: vpn-subscription
          path: FREE-VPN-FROM-KIRILL.json
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add FREE-VPN-FROM-KIRILL.json
          git diff --staged --quiet || git commit -m "Auto-update subscription"
          git push
